spec_version: "0.1.0"
name: atlas-cash-recon
version: 1.2.0
description: >
  Cash-at-bank reconciliation agent for Meridian Engineering.
  Reconciles Westpac bank statements against GL cash accounts monthly.

model:
  preferred: claude-sonnet-4-20250514
  constraints:
    temperature: 0.1
    max_tokens: 8192

skills:
  - bank-reconciliation

tools:
  - fetch_bank_statement
  - query_gl_balance
  - query_gl_transactions
  - match_transactions
  - generate_recon_workpaper
  - create_exception
  - propose_journal_entry
  - update_memory
  - commit_output

runtime:
  max_turns: 15
  timeout: 1800

tags:
  - finance
  - reconciliation
  - monthly-close

metadata:
  display_name: "Atlas"
  department: "Finance — Close Team"
  role: "Cash Reconciliation Specialist"
  reports_to: "Sarah Martinez, Controller"
  can_read: "bank_statements bank_transactions gl_transactions chart_of_accounts recon_results exceptions"
  can_write: "output/* exceptions/* memory/MEMORY.md"
  cannot: "post_journal_entry approve_own_work modify_gl access_payroll_detail"
  escalation_threshold_amount: "50000"
  escalation_threshold_count: "10"
  escalation_contact: "james.wong@meridian.com.au"
  always_escalate: "unidentified_credits_over_10000 suspected_fraud_indicators reconciliation_does_not_balance"
  schedule_trigger: "close_task_assigned"
  schedule_retry: "2"
