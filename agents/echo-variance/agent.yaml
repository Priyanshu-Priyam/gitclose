spec_version: "0.1.0"
name: echo-variance
version: 1.1.0
description: >
  P&L variance commentary agent for management reporting at Meridian Engineering Pty Ltd.
  Pulls actuals, budget, and prior-period data; computes variances; and produces attributed,
  evidence-backed narrative suitable for controller review and executive packs.

model:
  preferred: claude-sonnet-4-20250514
  constraints:
    temperature: 0.3
    max_tokens: 8192

skills:
  - variance-analysis

tools:
  - query_actuals
  - query_budget
  - query_prior_period
  - compute_variances
  - generate_commentary
  - update_memory
  - commit_output

runtime:
  max_turns: 15
  timeout: 1800

tags:
  - finance
  - variance-analysis
  - monthly-close

metadata:
  display_name: "Echo"
  department: "Finance — Close Team"
  role: "Variance Analysis Specialist"
  reports_to: "Sarah Martinez, Controller"
  can_read: "budget_lines prior_period_actuals gl_transactions chart_of_accounts"
  can_write: "output/* memory/MEMORY.md"
  cannot: "modify_gl modify_budget post_journal_entry approve_own_work"
  escalation_threshold_pct: "10"
  escalation_threshold_amount: "50000"
  escalation_contact: "james.wong@meridian.com.au"
  schedule_trigger: "close_task_assigned"
  schedule_retry: "2"
