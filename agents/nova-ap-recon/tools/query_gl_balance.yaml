name: query_gl_balance
description: >
  Returns the rolled balance and movement detail for a specified GL account and period.
  For Nova, primary use is account 2000-001 (Trade Payables) aligned to the same entity and
  period as the AP sub-ledger extract.

parameters:
  - name: account_id
    type: string
    required: true
    description: >
      Chart of accounts identifier. For Meridian AP recon this is typically 2000-001
      (Trade Payables); composite keys may include company or segment prefix per ERP.

  - name: period
    type: string
    required: true
    description: Accounting period in YYYY-MM format, consistent with query_ap_subledger.

  - name: entity_id
    type: string
    required: false
    description: >
      When the COA is not globally unique, pass the same entity_id used for AP extracts
      so balances resolve to the correct legal entity.

  - name: include_opening
    type: boolean
    required: false
    default: true
    description: When true, include opening balance and period movement breakdown.

  - name: include_unposted_context
    type: boolean
    required: false
    default: false
    description: >
      When true, surface non-posted journal batch hints if the integration exposes them
      (read-only); helps explain interface lag without modifying data.

returns:
  type: object
  properties:
    - name: account_id
      type: string
      description: Resolved account key.

    - name: account_name
      type: string
      description: Human-readable account title (e.g. Trade Payables).

    - name: entity_id
      type: string
      description: Entity the balance applies to, when segmented.

    - name: period
      type: string
      description: Queried period.

    - name: opening_balance
      type: number
      description: Balance at start of period (functional currency), when include_opening is true.

    - name: debits
      type: number
      description: Total debits to the account in period (when movement detail provided).

    - name: credits
      type: number
      description: Total credits to the account in period (when movement detail provided).

    - name: net_movement
      type: number
      description: Net change in period (implementation-defined sign convention — document in workpaper).

    - name: closing_balance
      type: number
      description: Balance at end of period in functional currency, exact to cents.

    - name: balance_as_of
      type: string
      description: ISO-8601 timestamp of GL snapshot.

    - name: reconciliation_hint
      type: string
      description: Optional ERP note (e.g. includes IC balances, excludes suspense).
